# default.conf — Local development only (HTTP).
# Staging/production SSL config is introduced with the deploy phases.

upstream api_upstream {
    server api:3001;
}

upstream web_upstream {
    server web:3000;
}

# ─── HTTP Server: Local Development ───
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # ─── Health check endpoint for nginx itself ───
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }

    # ─── API: proxy /api/* to NestJS (global prefix api/v1) ───
    location /api/ {
        proxy_pass http://api_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ─── Web: proxy everything else to Next.js (HMR websocket aware) ───
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
